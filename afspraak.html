<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cally — Afspraak</title>
  <meta name="theme-color" content="#0f1a14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1a14;
      --surface: #162019;
      --surface2: #1e2d22;
      --accent: #4ade80;
      --accent-dim: #22543d;
      --text: #f0faf3;
      --text-muted: #7aab8a;
      --border: rgba(74,222,128,0.15);
      --radius: 16px;
    }
    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.75rem;
    }
    .logo-mark {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .titel {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }
    .meta {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .omschrijving {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 0.75rem;
      line-height: 1.6;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }
    .vraag {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .cal-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cal-btn {
      width: 100%;
      padding: 15px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-btn:active { transform: scale(0.97); opacity: 0.88; }
    .cal-btn.google { background: #1a73e8; color: white; }
    .cal-btn.apple { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .error {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L10 10M10 10L6 6M10 10L14 6" stroke="#0f1a14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="3" y="13" width="14" height="5" rx="2" fill="#0f1a14"/>
      </svg>
    </div>
    <h1>Cally</h1>
  </div>
  <div id="inhoud"></div>
</div>

<script>
  function formatIcal(datum, tijd) {
    const [y, m, d] = datum.split('-');
    const [h, mi] = tijd.split(':');
    return y + m + d + 'T' + h + mi + '00';
  }

  function datumNl(datum) {
    const [y, m, d] = datum.split('-');
    return d + '-' + m + '-' + y;
  }

  function downloadIcs(titel, datum, tijd, eindtijd, locatie, omschrijving) {
    const start = formatIcal(datum, tijd);
    const eind = formatIcal(datum, eindtijd);
    const ics = [
      'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Cally//NL',
      'BEGIN:VEVENT',
      'DTSTART:' + start,
      'DTEND:' + eind,
      'SUMMARY:' + titel,
      'DESCRIPTION:' + (omschrijving || ''),
      'LOCATION:' + (locatie || ''),
      'END:VEVENT', 'END:VCALENDAR'
    ].join('\r\n');
    const blob = new Blob([ics], { type: 'text/calendar' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = titel.replace(/\s+/g, '_') + '.ics';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  const params = new URLSearchParams(window.location.search);
  const titel = params.get('titel');
  const datum = params.get('datum');
  const tijd = params.get('tijd');
  const eindtijd = params.get('eindtijd');
  const locatie = params.get('locatie') || '';
  const omschrijving = params.get('omschrijving') || '';

  const inhoud = document.getElementById('inhoud');

  if (!titel || !datum || !tijd || !eindtijd) {
    inhoud.innerHTML = `<div class="error">Ongeldige afspraaklink. Vraag de verzender om een nieuwe link te sturen.</div>`;
  } else {
    const start = formatIcal(datum, tijd);
    const eind = formatIcal(datum, eindtijd);
    const googleParams = new URLSearchParams({
      action: 'TEMPLATE', text: titel,
      dates: start + '/' + eind,
      details: omschrijving, location: locatie
    });
    const googleUrl = 'https://calendar.google.com/calendar/render?' + googleParams;

    inhoud.innerHTML = `
      <p class="badge">Je hebt een uitnodiging</p>
      <p class="titel">${titel}</p>
      <p class="meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${datumNl(datum)} van ${tijd} tot ${eindtijd}
      </p>
      ${locatie ? `<p class="meta"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${locatie}</p>` : ''}
      ${omschrijving ? `<p class="omschrijving">${omschrijving}</p>` : ''}
      <div class="divider"></div>
      <p class="vraag">Zet de afspraak in je agenda:</p>
      <div class="cal-buttons">
        <a class="cal-btn google" href="${googleUrl}" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google Calendar
        </a>
        <button class="cal-btn apple" onclick="downloadIcs('${titel.replace(/'/g,"\\'")}','${datum}','${tijd}','${eindtijd}','${locatie.replace(/'/g,"\\'")}','${omschrijving.replace(/'/g,"\\'")}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Apple Calendar
        </button>
        <a class="cal-btn" href="https://outlook.live.com/calendar/0/deeplink/compose?subject=${encodeURIComponent(titel)}&startdt=${formatIcal(datum,tijd)}&enddt=${formatIcal(datum,eindtijd)}&location=${encodeURIComponent(locatie)}&body=${encodeURIComponent(omschrijving)}&path=%2Fcalendar%2Faction%2Fcompose&rru=addevent" target="_blank" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 8h20"/><path d="M6 4v4"/><path d="M18 4v4"/></svg>
          Outlook
        </a>
      </div>
      <p class="footer">Verstuurd via <a href="/">Cally</a></p>
    `;
  }
</script>
</body>
</html>
