<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cally</title>
  <meta name="description" content="Maak een afspraak en stuur hem via WhatsApp. De ontvanger kan hem direct in zijn agenda zetten." />
  <meta name="theme-color" content="#0f1a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cally" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1a14;
      --surface: #162019;
      --surface2: #1e2d22;
      --accent: #4ade80;
      --accent-dim: #22543d;
      --text: #f0faf3;
      --text-muted: #7aab8a;
      --border: rgba(74,222,128,0.15);
      --radius: 16px;
      --wa: #25D366;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { display: block; }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }

    main {
      flex: 1;
      padding: 1.5rem 1.25rem 2rem;
      max-width: 540px;
      width: 100%;
      margin: 0 auto;
    }

    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,222,128,0.12);
    }

    input::placeholder, textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7) sepia(1) saturate(3) hue-rotate(90deg);
      cursor: pointer;
    }

    textarea { resize: vertical; min-height: 80px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .btn-wa {
      width: 100%;
      background: var(--wa);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: -0.3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-wa:active { transform: scale(0.97); opacity: 0.9; }

    .btn-install-inline {
      width: 100%;
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-install-inline:active { transform: scale(0.97); }

    .btn-secondary {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      transition: transform 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary:active { transform: scale(0.97); background: var(--accent-dim); }

    .error {
      font-size: 13px;
      color: #f87171;
      margin-top: 8px;
      display: none;
    }

    .preview-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: 1.5rem;
      display: none;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .preview-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .preview-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .cal-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cal-btn {
      flex: 1;
      min-width: 130px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .cal-btn:active { transform: scale(0.97); opacity: 0.85; }

    .cal-btn.google {
      background: #1a73e8;
      color: white;
    }

    .cal-btn.apple {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: #0f1a14;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 100px;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .install-bar {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 1rem 1.25rem;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .install-bar p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .install-bar strong { color: var(--text); }

    .btn-install {
      background: var(--accent);
      color: #0f1a14;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .popup-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .popup-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.25rem 2.5rem;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
      max-width: 540px;
      margin: 0 auto;
    }
    .popup-sheet.open {
      transform: translateY(0);
    }
    .popup-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 1.25rem;
    }
    .popup-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .popup-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-R2HHFNRY0V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-R2HHFNRY0V');
  </script>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L10 10M10 10L6 6M10 10L14 6" stroke="#0f1a14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="3" y="13" width="14" height="5" rx="2" fill="#0f1a14"/>
      </svg>
    </div>
    <h1>Cally</h1>
  </header>

  <main>
    <p class="section-label">Afspraakgegevens</p>

    <div class="form-group">
      <label for="titel">Titel</label>
      <input type="text" id="titel" placeholder="bijv. Koffie met Miriam" />
    </div>

    <div class="row">
      <div class="form-group">
        <label for="datum">Datum</label>
        <input type="date" id="datum" />
      </div>
      <div class="form-group">
        <label for="tijd">Begintijd</label>
        <input type="time" id="tijd" />
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="eindtijd">Eindtijd</label>
        <input type="time" id="eindtijd" />
      </div>
      <div class="form-group">
        <label for="locatie">Locatie</label>
        <input type="text" id="locatie" placeholder="optioneel" />
      </div>
    </div>

    <div class="form-group">
      <label for="omschrijving">Omschrijving</label>
      <textarea id="omschrijving" placeholder="Extra info (optioneel)..."></textarea>
    </div>

    <p class="error" id="foutmelding">Vul titel, datum, begintijd en eindtijd in.</p>

    <div class="divider"></div>

    <button class="btn-install-inline" id="installBtnInline" onclick="installeerApp()" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13M8 11l4 4 4-4"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
      Installeer de app
    </button>
    <div id="iosInstallTip" style="display:none; font-size:13px; color:var(--text-muted); text-align:center; padding: 10px 0; line-height:1.6;">
      Tik op <strong style="color:var(--text);">Deel</strong> <svg style="display:inline;vertical-align:middle;margin:0 2px;" width="16" height="16" viewBox="0 0 50 50" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="18" width="34" height="28" rx="4"/><line x1="25" y1="32" x2="25" y2="4"/><polyline points="15,14 25,4 35,14"/></svg> in Safari en kies <strong style="color:var(--text);">"Zet op beginscherm"</strong>
    </div>

    <button class="btn-secondary" onclick="kopieerLink()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Kopieer tekst

    </main>

  <div class="install-bar" id="installBar">
    <p><strong>Installeer de app</strong><br/>Zet hem op je thuisscherm</p>
    <button class="btn-install" id="installBtn">Installeer</button>
  </div>
</div>


<div class="popup-overlay" id="popupOverlay" onclick="sluitPopup()"></div>
<div class="popup-sheet" id="popupSheet">
  <div class="popup-handle"></div>
  <p class="popup-title" id="popup-titel"></p>
  <p class="popup-meta" id="popup-meta"></p>
  <div class="cal-buttons" style="flex-direction: column; gap: 10px;">
    <a class="cal-btn google" id="popup-google" href="#" target="_blank">

    <a class="cal-btn apple" id="popup-apple" href="#">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

<div class="toast" id="toast"></div>

<script>
  // PWA install prompt
  let deferredPrompt = null;
  const installBar = document.getElementById('installBar');
  const installBtn = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('installBtnInline');
    if (btn) { btn.style.display = 'flex'; }
  });

  // Show iOS tip on iPhone/iPad
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isIos && !isStandalone) {
    const tip = document.getElementById('iosInstallTip');
    if (tip) tip.style.display = 'block';
  }

  function installeerApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(({ outcome }) => {
      if (outcome === 'accepted') {
        document.getElementById('installBtnInline').style.display = 'none';
      }
      deferredPrompt = null;
    });
  }

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBar.style.display = 'none';
    deferredPrompt = null;
  });

  window.addEventListener('appinstalled', () => {
    installBar.style.display = 'none';
    gtag('event', 'app_install', { event_category: 'engagement' });
    toonToast('Cally geïnstalleerd!');
  });

  // Set today as default date
  const vandaag = new Date().toISOString().split('T')[0];
  document.getElementById('datum').value = vandaag;

  function toonToast(tekst) {
    const toast = document.getElementById('toast');
    toast.textContent = tekst;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatIcal(datum, tijd) {
    const [y, m, d] = datum.split('-');
    const [h, mi] = tijd.split(':');
    return y + m + d + 'T' + h + mi + '00';
  }

  function valideer() {
    const fout = document.getElementById('foutmelding');
    const v = ['titel','datum','tijd','eindtijd'].every(id => document.getElementById(id).value.trim());
    fout.style.display = v ? 'none' : 'block';
    return v;
  }

  function bouwData() {
    const titel = document.getElementById('titel').value.trim();
    const datum = document.getElementById('datum').value;
    const tijd = document.getElementById('tijd').value;
    const eindtijd = document.getElementById('eindtijd').value;
    const locatie = document.getElementById('locatie').value.trim();
    const omschrijving = document.getElementById('omschrijving').value.trim();

    const start = formatIcal(datum, tijd);
    const eind = formatIcal(datum, eindtijd);

    const googleParams = new URLSearchParams({
      action: 'TEMPLATE', text: titel,
      dates: start + '/' + eind,
      details: omschrijving, location: locatie
    });
    const googleUrl = 'https://calendar.google.com/calendar/render?' + googleParams;

    const ics = [
      'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Cally//NL',
      'BEGIN:VEVENT',
      'DTSTART:' + start, 'DTEND:' + eind,
      'SUMMARY:' + titel, 'DESCRIPTION:' + omschrijving, 'LOCATION:' + locatie,
      'END:VEVENT','END:VCALENDAR'
    ].join('\r\n');
    const icsUrl = URL.createObjectURL(new Blob([ics], { type: 'text/calendar' }));

    const [y,m,d] = datum.split('-');
    const datumNl = d + '-' + m + '-' + y;

    const shareParams = new URLSearchParams({ titel, datum, tijd, eindtijd, locatie, omschrijving });
    const basePath = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
    const shareUrl = window.location.origin + basePath + '/afspraak.html?' + shareParams;

    return { titel, datum, datumNl, tijd, eindtijd, locatie, googleUrl, icsUrl, shareUrl };
  }

  function delenViaWhatsapp() {
    if (!valideer()) return;
    const data = bouwData();
    const tekst =
      `📅 *${data.titel}*\n` +
      `🗓 ${data.datumNl} van ${data.tijd} tot ${data.eindtijd}` +
      (data.locatie ? `\n📍 ${data.locatie}` : '') +
      `\n\n➕ Tik op de link om de afspraak in je agenda te zetten:\n${data.shareUrl}`;

    gtag('event', 'whatsapp_share', { event_category: 'engagement' });
    toonPopup(data, tekst);
  }

    function kopieerLink() {
    if (!valideer()) return;
    const data = bouwData();
    navigator.clipboard.writeText(data.shareUrl).then(() => toonToast('Link gekopieerd!'));
  }

  
  let _waLink = null;

  function toonPopup(data, watekst) {
    _waLink = watekst ? 'https://wa.me/?text=' + encodeURIComponent(watekst) : null;
    document.getElementById('popup-titel').textContent = data.titel;
    let meta = data.datumNl + ' · ' + data.tijd + '–' + data.eindtijd;
    if (data.locatie) meta += ' · ' + data.locatie;
    document.getElementById('popup-meta').textContent = meta;
    document.getElementById('popup-google').href = data.googleUrl;
    const appleLink = document.getElementById('popup-apple');
    appleLink.href = data.icsUrl;
    appleLink.download = data.titel.replace(/\s+/g, '_') + '.ics';
    const outlookLink = document.getElementById('popup-outlook');
    if (outlookLink) {
      const olParams = new URLSearchParams({
        subject: data.titel,
        startdt: formatIcal(data.datum, data.tijd),
        enddt: formatIcal(data.datum, data.eindtijd),
        location: data.locatie,
        body: data.omschrijving || '',
        path: '/calendar/action/compose',
        rru: 'addevent'
      });
      outlookLink.href = 'https://outlook.live.com/calendar/0/deeplink/compose?' + olParams;
    }
    const waBtn = document.getElementById('popup-wa-btn');
    if (waBtn) waBtn.style.display = _waLink ? 'flex' : 'none';
    document.getElementById('popupOverlay').classList.add('open');
    document.getElementById('popupSheet').classList.add('open');
  }

  function sluitEnVerstuur() {
    sluitPopup();
    if (_waLink) setTimeout(() => window.open(_waLink, '_blank'), 300);
  }

  function sluitPopup() {
    document.getElementById('popupOverlay').classList.remove('open');
    document.getElementById('popupSheet').classList.remove('open');
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
